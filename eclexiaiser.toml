# eclexiaiser manifest for blocky-writer

[project]
name = "blocky-writer"

[[functions]]
name = "process"
source = "src/main.rs"
energy-budget-mj = 60.0

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
